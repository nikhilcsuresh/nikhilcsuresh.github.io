<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nikhil Suresh</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.5;
      color: #111;
      background: #ffffff;
      min-height: 100vh;
    }

    .container {
      max-width: 550px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    .profile {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 40px;
    }

    .profile-pic {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .profile-info h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #111;
    }

    .profile-info p {
      font-size: 14px;
      color: #666;
    }

    a {
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #ddd;
      transition: border-color 0.2s;
    }

    a:hover {
      border-color: #111;
    }

    .links {
      display: flex;
      gap: 16px;
      font-size: 14px;
      margin-bottom: 40px;
    }

    section {
      margin-bottom: 48px;
    }

    section h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #111;
      text-transform: lowercase;
      letter-spacing: 0.5px;
    }

    .investments-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .investment-item {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .investment-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile">
      <img src="profile.jpg" alt="Nikhil Suresh" class="profile-pic">
      <div class="profile-info">
        <h1>Nikhil Suresh</h1>
        <p>Product & AI investing</p>
      </div>
    </div>

    <div class="links">
      <a href="mailto:reachnikhilsuresh@gmail.com">email</a>
      <a href="https://x.com/nikhil_suresh2" target="_blank">twitter</a>
      <a href="https://www.linkedin.com/in/~nikhil/" target="_blank">linkedin</a>
    </div>

    <section>
      <h2>investments</h2>
      <div class="investments-list">
        <!-- Add your investments here -->
      </div>
    </section>
  </div>
</body>
</html>
